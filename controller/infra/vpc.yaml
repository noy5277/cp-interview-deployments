apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vpc
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - path: infra/main/vpc
      repoURL: https://github.com/noy5277/cp-interview-deployments
      targetRevision: HEAD
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
    - CreateNamespace=true